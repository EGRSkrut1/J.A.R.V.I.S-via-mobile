name: jarvis_mobile
description: "Mobile client for J.A.R.V.I.S. voice assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.3.0

  # Video playback
  video_player: ^2.9.3

  # File picking (for sending videos/photos)
  file_picker: ^8.1.7

  # Image picking
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.5.3

  # Audio recording
  record: ^5.0.2

  # Audio playback
  audioplayers: ^6.2.0

  # State management (optional, but useful)
  provider: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/
    - assets/icons/
    - assets/sounds/